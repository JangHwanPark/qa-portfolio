openapi: 3.0.3
info:
  title: API Playground
  version: 0.1.0
  description: |
    API 테스트 학습용 샘플 서버.
    Postman / Swagger UI / Supertest 등 다양한 방법으로 호출해보며 학습한다.
servers:
  - url: http://localhost:3001
paths:
  /api/health:
    get:
      summary: 헬스 체크
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  ts:     { type: string, format: date-time }
  /api/users:
    get:
      summary: 유저 목록 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
    post:
      summary: 유저 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:  { type: string }
                email: { type: string, format: email }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400':
          description: Bad Request
  /api/users/{id}:
    get:
      summary: 유저 단건 조회
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404':
          description: Not Found
components:
  schemas:
    User:
      type: object
      properties:
        id:    { type: integer, example: 1 }
        name:  { type: string,  example: Alice }
        email: { type: string,  format: email, example: alice@example.com }
